 <!doctype html>
 <html lang="en">
 <head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1" />
   <title>QuickKart • Products</title>
   <link rel="stylesheet" href="assets/css/styles.css" />
 </head>
 <body data-page="products">
   <header class="nav">
     <div class="container nav-inner">
       <a class="brand" href="index.html">QuickKart</a>
       <nav class="nav-links">
         <a href="index.html" data-nav="home">Home</a>
         <a href="food.html" data-nav="food">Food</a>
         <a href="groceries.html" data-nav="groceries">Groceries</a>
         <a href="products.html" data-nav="products">Products</a>
         <a href="eproducts.html" data-nav="eproducts">E‑Products</a>
         <a href="compare.html" data-nav="compare">Compare</a>
         <a class="pill" href="cart.html" data-nav="cart">Cart <span class="cart-count" data-cart-count>0</span></a>
       </nav>
     </div>
   </header>
 
   <main class="page">
     <div class="container">
       <div class="page-head">
         <div>
           <h1 class="page-title">Products</h1>
           <p class="page-note">General shopping items for daily use.</p>
         </div>
         <div class="toolbar">
           <label class="field">
             <span class="small">Search</span>
             <input data-search placeholder="e.g., backpack" />
           </label>
           <label class="field">
             <span class="small">Sort</span>
             <select data-sort>
               <option value="popular">Popular</option>
               <option value="price-asc">Price: Low → High</option>
               <option value="price-desc">Price: High → Low</option>
               <option value="name">Name</option>
             </select>
           </label>
         </div>
       </div>
 
       <section class="grid" data-products></section>
     </div>
   </main>
 
   <script src="assets/js/app.js"></script>
 </body>
 </html>
